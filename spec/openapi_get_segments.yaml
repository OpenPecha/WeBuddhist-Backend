openapi: 3.1.0
info:
  title: Get Segments API
  description: |
    API for retrieving segment content from MongoDB using segment IDs stored in PostgreSQL.
    This complements the store segments API by fetching full segment data on-demand.
  version: 1.0.0

servers:
  - url: /search
    description: Search API base path

paths:
  /segments:
    get:
      summary: Retrieve Segments by IDs
      description: |
        Retrieves full segment content from MongoDB using segment IDs.
        
        **Workflow:**
        1. Frontend sends list of segment IDs as query parameter
        2. Backend fetches full segment data from MongoDB
        3. Returns segment content with all fields (id, pecha_segment_id, text_id, content, mapping, type)
        
        This enables lazy loading of segment content when needed.
      operationId: get_segments_by_ids
      tags:
        - Search
      parameters:
        - name: segment_ids
          in: query
          required: true
          description: List of segment UUIDs to retrieve
          schema:
            type: array
            items:
              type: string
              format: uuid
            minItems: 1
            maxItems: 100
          style: form
          explode: true
          example:
            - "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
            - "b2c3d4e5-f6a7-8901-bcde-f12345678901"
            - "c3d4e5f6-a7b8-9012-cdef-123456789012"
      responses:
        '200':
          description: Segments retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetSegmentsResponse'
              example:
                segments:
                  - id: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
                    pecha_segment_id: "P000001-001"
                    text_id: "text_001"
                    content: "བཀྲ་ཤིས་བདེ་ལེགས།"
                    type: "ROOT"
                    mapping:
                      - text_id: "text_002"
                        segments:
                          - "seg_001"
                          - "seg_002"
                  - id: "b2c3d4e5-f6a7-8901-bcde-f12345678901"
                    pecha_segment_id: "P000001-002"
                    text_id: "text_001"
                    content: "སངས་རྒྱས་ཆོས་དང་།"
                    type: "ROOT"
                    mapping: null
                count: 2
        '400':
          description: Bad Request - Invalid segment IDs
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                empty_list:
                  summary: Empty segment IDs list
                  value:
                    error: "VALIDATION_ERROR"
                    message: "Segment IDs list cannot be empty"
                invalid_uuid:
                  summary: Invalid UUID format
                  value:
                    error: "VALIDATION_ERROR"
                    message: "Invalid segment ID format: 'invalid-id'"
        '404':
          description: Not Found - Some segments not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PartialNotFoundResponse'
              example:
                error: "PARTIAL_NOT_FOUND"
                message: "Some segments not found in MongoDB"
                found_segments:
                  - id: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
                    pecha_segment_id: "P000001-001"
                    text_id: "text_001"
                    content: "བཀྲ་ཤིས་བདེ་ལེགས།"
                    type: "ROOT"
                missing_ids:
                  - "c3d4e5f6-a7b8-9012-cdef-123456789012"
        '422':
          description: Unprocessable Entity - Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: "DATABASE_ERROR"
                message: "Failed to retrieve segments from MongoDB"

components:
  schemas:
    SegmentMapping:
      type: object
      description: Mapping to related segments in other texts
      properties:
        text_id:
          type: string
          description: ID of the related text
          example: "text_002"
        segments:
          type: array
          description: List of related segment IDs
          items:
            type: string
          example:
            - "seg_001"
            - "seg_002"

    SegmentItem:
      type: object
      description: Full segment data from MongoDB
      required:
        - id
        - text_id
        - content
        - type
      properties:
        id:
          type: string
          format: uuid
          description: Unique segment identifier
          example: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
        pecha_segment_id:
          type: string
          nullable: true
          description: Pecha-specific segment identifier
          example: "P000001-001"
        text_id:
          type: string
          description: ID of the text this segment belongs to
          example: "text_001"
        content:
          type: string
          description: Segment text content
          example: "བཀྲ་ཤིས་བདེ་ལེགས།"
        type:
          type: string
          enum:
            - ROOT
            - COMMENTARY
            - TRANSLATION
          description: Type of segment
          example: "ROOT"
        mapping:
          type: array
          nullable: true
          description: Mappings to related segments in other texts
          items:
            $ref: '#/components/schemas/SegmentMapping'

    GetSegmentsResponse:
      type: object
      description: Response containing list of retrieved segments
      required:
        - segments
        - count
      properties:
        segments:
          type: array
          description: List of segment data retrieved from MongoDB
          items:
            $ref: '#/components/schemas/SegmentItem'
        count:
          type: integer
          description: Number of segments retrieved
          minimum: 0
          example: 5

    PartialNotFoundResponse:
      type: object
      description: Response when some segments are found but others are missing
      required:
        - error
        - message
        - found_segments
        - missing_ids
      properties:
        error:
          type: string
          description: Error code
          example: "PARTIAL_NOT_FOUND"
        message:
          type: string
          description: Human-readable error message
          example: "Some segments not found in MongoDB"
        found_segments:
          type: array
          description: Segments that were found
          items:
            $ref: '#/components/schemas/SegmentItem'
        missing_ids:
          type: array
          description: Segment IDs that were not found
          items:
            type: string
            format: uuid
          example:
            - "c3d4e5f6-a7b8-9012-cdef-123456789012"

    ErrorResponse:
      type: object
      description: Standard error response
      required:
        - error
        - message
      properties:
        error:
          type: string
          description: Error code
          example: "VALIDATION_ERROR"
        message:
          type: string
          description: Human-readable error message
          example: "Invalid segment data provided"

    ValidationErrorDetail:
      type: object
      description: Details of a validation error
      properties:
        loc:
          type: array
          description: Location of the error in the request
          items:
            oneOf:
              - type: string
              - type: integer
          example:
            - "query"
            - "segment_ids"
        msg:
          type: string
          description: Error message
          example: "Field required"
        type:
          type: string
          description: Error type
          example: "missing"

    ValidationErrorResponse:
      type: object
      description: FastAPI validation error response
      properties:
        detail:
          type: array
          items:
            $ref: '#/components/schemas/ValidationErrorDetail'

openapi: 3.0.3
info:
  title: WeBuddhist Routine API
  description: |
    OpenAPI spec for the Routine persistence feature.

    ## Context
    The Routine Builder in the Flutter app currently stores all routine data
    (time blocks, sessions) in local storage. This means data is lost when
    the app is uninstalled/reinstalled (see issue #126). This spec defines
    backend endpoints and schema to persist routine data server-side.

    ## Key Design Decisions
    - A user has exactly one routine
    - The routine is purely structural — it stores what sessions go in what
      time blocks and in what order
    - Plan progress/completion is not tracked here (already exists in
      `UserPlanProgress`)
    - Recitation progress is not tracked here (does not currently exist)
    - A plan can only appear once across the entire routine
    - Recitations can appear multiple times across time blocks or within
      the same time block
    - A time block must have at least one session
    - Each time block must have a unique time within the routine
    - Sessions referencing deleted plans or removed texts are silently
      skipped in the GET response
    - Time block deletion is soft delete (sets deleted_at timestamp)
    - The API is called each time a session is added to a time block
  version: 1.0.0

servers:
  - url: /api/v1
    description: WeBuddhist API v1

tags:
  - name: User Routines
    description: CRUD operations for user routine persistence

security:
  - BearerAuth: []

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:

    SessionType:
      type: string
      enum:
        - PLAN
        - RECITATION

    SessionRequest:
      type: object
      required:
        - session_type
        - display_order
      properties:
        session_type:
          $ref: '#/components/schemas/SessionType'
        plan_id:
          type: string
          format: uuid
          nullable: true
          description: Required when session_type is PLAN. References plans.id.
        text_id:
          type: string
          format: uuid
          nullable: true
          description: Required when session_type is RECITATION. References MongoDB text document ID.
        display_order:
          type: integer
          minimum: 0
          description: Order of this session within the time block.

    CreateTimeBlockRequest:
      type: object
      required:
        - time
        - time_minutes
        - sessions
      properties:
        time:
          type: string
          pattern: '^([01]\d|2[0-3]):[0-5]\d$'
          description: Time of day in 24-hour HH:MM format. Must be unique within the routine.
          example: "12:00"
        time_minutes:
          type: integer
          minimum: 0
          maximum: 1439
          description: Time as minutes since midnight.
          example: 720
        notification_enabled:
          type: boolean
          default: true
        sessions:
          type: array
          items:
            $ref: '#/components/schemas/SessionRequest'
          minItems: 1

    UpdateTimeBlockRequest:
      type: object
      required:
        - time
        - time_minutes
        - sessions
      properties:
        time:
          type: string
          pattern: '^([01]\d|2[0-3]):[0-5]\d$'
          description: Time of day in 24-hour HH:MM format. Must be unique within the routine.
          example: "08:00"
        time_minutes:
          type: integer
          minimum: 0
          maximum: 1439
          description: Time as minutes since midnight.
          example: 480
        notification_enabled:
          type: boolean
          default: true
        sessions:
          type: array
          items:
            $ref: '#/components/schemas/SessionRequest'
          minItems: 1

    SessionDTO:
      type: object
      required:
        - id
        - session_type
        - title
        - language
        - display_order
      properties:
        id:
          type: string
          format: uuid
        session_type:
          $ref: '#/components/schemas/SessionType'
        plan_id:
          type: string
          format: uuid
          nullable: true
        text_id:
          type: string
          format: uuid
          nullable: true
        title:
          type: string
          description: Resolved from plans table or MongoDB texts collection.
        language:
          type: string
          description: Language of the plan or recitation.
          example: "en"
        image_url:
          type: string
          nullable: true
          description: Thumbnail image URL. Null for recitations.
        display_order:
          type: integer

    TimeBlockDTO:
      type: object
      required:
        - id
        - time
        - time_minutes
        - notification_enabled
        - sessions
      properties:
        id:
          type: string
          format: uuid
        time:
          type: string
          example: "12:00"
        time_minutes:
          type: integer
          example: 720
        notification_enabled:
          type: boolean
        sessions:
          type: array
          items:
            $ref: '#/components/schemas/SessionDTO'

    RoutineResponse:
      type: object
      required:
        - time_blocks
        - skip
        - limit
        - total
      properties:
        time_blocks:
          type: array
          items:
            $ref: '#/components/schemas/TimeBlockDTO'
        skip:
          type: integer
          description: Number of time blocks skipped.
          example: 0
        limit:
          type: integer
          description: Maximum number of time blocks returned.
          example: 20
        total:
          type: integer
          description: Total number of time blocks in the routine.
          example: 3

    ErrorResponse:
      type: object
      required:
        - error
        - message
      properties:
        error:
          type: string
        message:
          type: string

  responses:
    Unauthorized:
      description: Invalid or missing JWT token.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Resource not found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    ValidationError:
      description: Validation error.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

paths:

  /users/me/routine:

    get:
      tags:
        - User Routines
      summary: Get user's routine
      description: |
        Returns the authenticated user's routine with all time blocks and sessions.
        Sessions include resolved title, language, and image_url.

        Only non-deleted time blocks are returned (filtered by deleted_at IS NULL).
        Sessions referencing soft-deleted plans or removed MongoDB texts are
        silently skipped (not included in the response).

        Supports pagination via skip and limit query parameters.
      operationId: getUserRoutine
      parameters:
        - name: skip
          in: query
          required: false
          schema:
            type: integer
            default: 0
            minimum: 0
          description: Number of time blocks to skip.
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 20
            minimum: 1
          description: Maximum number of time blocks to return.
      responses:
        '200':
          description: Success.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoutineResponse'
              example:
                time_blocks:
                  - id: "aaaa1111-bbbb-cccc-dddd-eeee11111111"
                    time: "12:00"
                    time_minutes: 720
                    notification_enabled: true
                    sessions:
                      - id: "ssss1111-2222-3333-4444-555555555555"
                        session_type: "PLAN"
                        plan_id: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
                        text_id: null
                        title: "AIY - Introduction"
                        language: "en"
                        image_url: "https://s3.amazonaws.com/plans/aiy-intro-thumb.jpg"
                        display_order: 0
                      - id: "ssss2222-2222-3333-4444-555555555555"
                        session_type: "RECITATION"
                        plan_id: null
                        text_id: "f9e8d7c6-b5a4-3210-fedc-ba9876543210"
                        title: "Praise to Bhagavatī Tārā"
                        language: "en"
                        image_url: null
                        display_order: 1
                  - id: "aaaa2222-bbbb-cccc-dddd-eeee22222222"
                    time: "12:10"
                    time_minutes: 730
                    notification_enabled: true
                    sessions:
                      - id: "ssss3333-2222-3333-4444-555555555555"
                        session_type: "PLAN"
                        plan_id: "b2c3d4e5-f6a7-8901-bcde-f12345678901"
                        text_id: null
                        title: "Days 01-08"
                        language: "en"
                        image_url: "https://s3.amazonaws.com/plans/days-01-08-thumb.jpg"
                        display_order: 0
                skip: 0
                limit: 20
                total: 2
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /users/me/routine/time-blocks:

    post:
      tags:
        - User Routines
      summary: Create a time block
      description: |
        Creates a single time block with its sessions in the user's routine.
        The API is called each time a session is added to the time block.

        Validation:
        - Must have at least one session
        - Time must be unique within the routine
        - Each session must have exactly one of plan_id or text_id set
        - A plan_id can only appear once across the entire routine (422 if duplicate)
        - time must be valid HH:MM 24-hour format (00:00 to 23:59)
      operationId: createTimeBlock
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTimeBlockRequest'
            example:
              time: "12:00"
              time_minutes: 720
              notification_enabled: true
              sessions:
                - session_type: "PLAN"
                  plan_id: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
                  display_order: 0
      responses:
        '201':
          description: Time block created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TimeBlockDTO'
              example:
                id: "aaaa1111-bbbb-cccc-dddd-eeee11111111"
                time: "12:00"
                time_minutes: 720
                notification_enabled: true
                sessions:
                  - id: "ssss1111-2222-3333-4444-555555555555"
                    session_type: "PLAN"
                    plan_id: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
                    text_id: null
                    title: "AIY - Introduction"
                    language: "en"
                    image_url: "https://s3.amazonaws.com/plans/aiy-intro-thumb.jpg"
                    display_order: 0
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          description: Time block with this time already exists.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          $ref: '#/components/responses/ValidationError'

  /users/me/routine/time-blocks/{time_block_id}:

    put:
      tags:
        - User Routines
      summary: Update a time block
      description: |
        Replaces a single time block and its sessions.
        All existing sessions in the time block are deleted and replaced.
        Called each time a session is added or modified in the time block.
        Same validation rules as POST apply.
      operationId: updateTimeBlock
      parameters:
        - name: time_block_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: ID of the time block to update.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTimeBlockRequest'
            example:
              time: "12:00"
              time_minutes: 720
              notification_enabled: true
              sessions:
                - session_type: "PLAN"
                  plan_id: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
                  display_order: 0
                - session_type: "RECITATION"
                  text_id: "f9e8d7c6-b5a4-3210-fedc-ba9876543210"
                  display_order: 1
      responses:
        '201':
          description: Time block updated successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TimeBlockDTO'
              example:
                id: "aaaa1111-bbbb-cccc-dddd-eeee11111111"
                time: "12:00"
                time_minutes: 720
                notification_enabled: true
                sessions:
                  - id: "ssss1111-2222-3333-4444-555555555555"
                    session_type: "PLAN"
                    plan_id: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
                    text_id: null
                    title: "AIY - Introduction"
                    language: "en"
                    image_url: "https://s3.amazonaws.com/plans/aiy-intro-thumb.jpg"
                    display_order: 0
                  - id: "ssss2222-2222-3333-4444-555555555555"
                    session_type: "RECITATION"
                    plan_id: null
                    text_id: "f9e8d7c6-b5a4-3210-fedc-ba9876543210"
                    title: "Praise to Bhagavatī Tārā"
                    language: "en"
                    image_url: null
                    display_order: 1
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'

    delete:
      tags:
        - User Routines
      summary: Delete a time block
      description: |
        Soft deletes a single time block by setting deleted_at timestamp.
        The time block and its sessions remain in the database but are
        excluded from GET responses. Does not affect plan enrollments
        or user recitations.
      operationId: deleteTimeBlock
      parameters:
        - name: time_block_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: ID of the time block to delete.
      responses:
        '204':
          description: Time block deleted successfully.
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

# ──────────────────────────────────────────────
# Database Tables (via Alembic migration)
# ──────────────────────────────────────────────
#
# Table: routines
# ─────────────────────────────────────────────
# id                    UUID  PK  default uuid4()
# user_id               UUID  FK → users.id  ON DELETE CASCADE
# time                  String(5)  NOT NULL  (HH:MM 24-hour display format)
# time_minutes          Integer  NOT NULL  (minutes since midnight, 0–1439)
# notification_enabled  Boolean  default true
# created_at            DateTime(tz)  default now()
# updated_at            DateTime(tz)  default now()
# deleted_at            DateTime(tz)  nullable
# deleted_by            String(255)  nullable
#
# Index: idx_routines_user on user_id
# Unique: (user_id, time) — no duplicate times per user
# Query filter: deleted_at IS NULL (exclude soft-deleted time blocks)
#
# Table: routine_sessions
# ─────────────────────────────────────────────
# id              UUID  PK  default uuid4()
# routine_id      UUID  FK → routines.id  ON DELETE CASCADE
# session_type    Enum('PLAN','RECITATION')  NOT NULL
# plan_id         UUID  nullable  FK → plans.id  ON DELETE RESTRICT
# text_id         UUID  nullable  (references MongoDB, no FK)
# display_order   Integer  NOT NULL
# created_at      DateTime(tz)  default now()
# updated_at      DateTime(tz)  default now()
#
# Index: idx_sessions_routine on routine_id
# Unique: idx_unique_plan_per_routine on plan_id WHERE plan_id IS NOT NULL
# Check: (session_type='PLAN' AND plan_id IS NOT NULL AND text_id IS NULL)
#     OR (session_type='RECITATION' AND text_id IS NOT NULL AND plan_id IS NULL)
# text_id: no unique constraint (recitations can repeat)
#
# Relationships:
#   User (1) ──── (many) Routine (time blocks)
#   Routine (1) ──── (many) RoutineSession
#
# Cascade: Delete User → Routines → Sessions
# Soft delete: Only on routines table (deleted_at/deleted_by)
# Sessions are not soft-deleted — they become invisible when parent is soft-deleted
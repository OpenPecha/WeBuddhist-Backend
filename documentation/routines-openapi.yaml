openapi: 3.0.3
info:
  title: WeBuddhist Routine API
  description: |
    OpenAPI spec for the Routine persistence feature.

    ## Context
    The Routine Builder in the Flutter app currently stores all routine data
    (time blocks, sessions) in local storage. This means data is lost when
    the app is uninstalled/reinstalled (see issue #126). This spec defines
    backend endpoints and schema to persist routine data server-side.

    ## Key Design Decisions
    - A user has exactly one routine
    - The routine is purely structural — it stores what sessions go in what
      time blocks and in what order
    - Plan progress/completion is not tracked here (already exists in
      `UserPlanProgress`)
    - Recitation progress is not tracked here (does not currently exist)
    - A plan can only appear once across the entire routine
    - Recitations can appear multiple times across time blocks or within
      the same time block
    - A routine must have at least one time block
    - A time block must have at least one session
    - Each time block must have a unique time within the routine
    - Sessions referencing deleted plans or removed texts are silently
      skipped in the GET response
  version: 1.0.0

servers:
  - url: /api/v1
    description: WeBuddhist API v1

tags:
  - name: User Routines
    description: CRUD operations for user routine persistence

security:
  - BearerAuth: []

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:

    SessionType:
      type: string
      enum:
        - PLAN
        - RECITATION

    SessionRequest:
      type: object
      required:
        - session_type
        - display_order
      properties:
        session_type:
          $ref: '#/components/schemas/SessionType'
        plan_id:
          type: string
          format: uuid
          nullable: true
          description: Required when session_type is PLAN. References plans.id.
        text_id:
          type: string
          format: uuid
          nullable: true
          description: Required when session_type is RECITATION. References MongoDB text document ID.
        display_order:
          type: integer
          minimum: 0
          description: Order of this session within the time block.

    TimeBlockRequest:
      type: object
      required:
        - time
        - display_order
        - sessions
      properties:
        time:
          type: string
          pattern: '^([01]\d|2[0-3]):[0-5]\d$'
          description: Time of day in 24-hour HH:MM format. Must be unique within the routine.
          example: "12:00"
        notification_enabled:
          type: boolean
          default: true
        display_order:
          type: integer
          minimum: 0
          description: Order of this time block within the routine.
        sessions:
          type: array
          items:
            $ref: '#/components/schemas/SessionRequest'
          minItems: 1

    CreateRoutineRequest:
      type: object
      required:
        - time_blocks
      properties:
        time_blocks:
          type: array
          items:
            $ref: '#/components/schemas/TimeBlockRequest'
          minItems: 1

    UpdateRoutineRequest:
      type: object
      required:
        - time_blocks
      properties:
        time_blocks:
          type: array
          items:
            $ref: '#/components/schemas/TimeBlockRequest'
          minItems: 1
          description: Full replacement — all existing time blocks and sessions are replaced.

    SessionDTO:
      type: object
      required:
        - id
        - session_type
        - title
        - display_order
      properties:
        id:
          type: string
          format: uuid
        session_type:
          $ref: '#/components/schemas/SessionType'
        plan_id:
          type: string
          format: uuid
          nullable: true
        text_id:
          type: string
          format: uuid
          nullable: true
        title:
          type: string
          description: Resolved from plans table or MongoDB texts collection.
        image_url:
          type: string
          nullable: true
          description: Thumbnail image URL. Null for recitations.
        display_order:
          type: integer

    TimeBlockDTO:
      type: object
      required:
        - id
        - time
        - notification_enabled
        - display_order
        - sessions
      properties:
        id:
          type: string
          format: uuid
        time:
          type: string
          example: "12:00"
        notification_enabled:
          type: boolean
        display_order:
          type: integer
        sessions:
          type: array
          items:
            $ref: '#/components/schemas/SessionDTO'

    RoutineResponse:
      type: object
      required:
        - routine_id
        - time_blocks
        - created_at
        - updated_at
      properties:
        routine_id:
          type: string
          format: uuid
        time_blocks:
          type: array
          items:
            $ref: '#/components/schemas/TimeBlockDTO'
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    ErrorResponse:
      type: object
      required:
        - error
        - message
      properties:
        error:
          type: string
        message:
          type: string

  responses:
    Unauthorized:
      description: Invalid or missing JWT token.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Resource not found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    ValidationError:
      description: Validation error.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

paths:

  /users/me/routine:

    get:
      tags:
        - User Routines
      summary: Get user's routine
      description: |
        Returns the authenticated user's routine with all time blocks and sessions.
        Sessions include resolved title and image_url.

        Sessions referencing soft-deleted plans or removed MongoDB texts are
        silently skipped (not included in the response).
      operationId: getUserRoutine
      responses:
        '200':
          description: Success.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoutineResponse'
              example:
                routine_id: "11111111-2222-3333-4444-555555555555"
                time_blocks:
                  - id: "aaaa1111-bbbb-cccc-dddd-eeee11111111"
                    time: "12:00"
                    notification_enabled: true
                    display_order: 0
                    sessions:
                      - id: "ssss1111-2222-3333-4444-555555555555"
                        session_type: "PLAN"
                        plan_id: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
                        text_id: null
                        title: "AIY - Introduction"
                        image_url: "https://s3.amazonaws.com/plans/aiy-intro-thumb.jpg"
                        display_order: 0
                      - id: "ssss2222-2222-3333-4444-555555555555"
                        session_type: "RECITATION"
                        plan_id: null
                        text_id: "f9e8d7c6-b5a4-3210-fedc-ba9876543210"
                        title: "Praise to Bhagavatī Tārā"
                        image_url: null
                        display_order: 1
                  - id: "aaaa2222-bbbb-cccc-dddd-eeee22222222"
                    time: "12:10"
                    notification_enabled: true
                    display_order: 1
                    sessions:
                      - id: "ssss3333-2222-3333-4444-555555555555"
                        session_type: "PLAN"
                        plan_id: "b2c3d4e5-f6a7-8901-bcde-f12345678901"
                        text_id: null
                        title: "Days 01-08"
                        image_url: "https://s3.amazonaws.com/plans/days-01-08-thumb.jpg"
                        display_order: 0
                      - id: "ssss4444-2222-3333-4444-555555555555"
                        session_type: "RECITATION"
                        plan_id: null
                        text_id: "e8d7c6b5-a432-10fe-dcba-987654321098"
                        title: "The Sūtra of the Heart of Transcendent Wisdom"
                        image_url: null
                        display_order: 1
                created_at: "2026-03-17T06:00:00Z"
                updated_at: "2026-03-17T06:30:00Z"
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

    post:
      tags:
        - User Routines
      summary: Create user's routine
      description: |
        Creates a new routine for the authenticated user.
        Returns 409 if a routine already exists.

        Validation:
        - Must have at least one time block
        - Each time block must have at least one session
        - Each time block must have a unique time value
        - Each session must have exactly one of plan_id or text_id set
        - A plan_id can only appear once across all time blocks (422 if duplicate)
        - time must be valid HH:MM 24-hour format (00:00 to 23:59)
      operationId: createUserRoutine
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRoutineRequest'
            example:
              time_blocks:
                - time: "12:00"
                  notification_enabled: true
                  display_order: 0
                  sessions:
                    - session_type: "PLAN"
                      plan_id: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
                      display_order: 0
                    - session_type: "RECITATION"
                      text_id: "f9e8d7c6-b5a4-3210-fedc-ba9876543210"
                      display_order: 1
                - time: "12:10"
                  notification_enabled: true
                  display_order: 1
                  sessions:
                    - session_type: "PLAN"
                      plan_id: "b2c3d4e5-f6a7-8901-bcde-f12345678901"
                      display_order: 0
      responses:
        '201':
          description: Routine created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoutineResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          description: Routine already exists.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          $ref: '#/components/responses/ValidationError'

    put:
      tags:
        - User Routines
      summary: Update user's routine
      description: |
        Replaces the authenticated user's entire routine.
        All existing time blocks and sessions are deleted and replaced.
        Same validation rules as POST apply.
      operationId: updateUserRoutine
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateRoutineRequest'
            example:
              time_blocks:
                - time: "08:00"
                  notification_enabled: true
                  display_order: 0
                  sessions:
                    - session_type: "PLAN"
                      plan_id: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
                      display_order: 0
                - time: "18:00"
                  notification_enabled: false
                  display_order: 1
                  sessions:
                    - session_type: "RECITATION"
                      text_id: "f9e8d7c6-b5a4-3210-fedc-ba9876543210"
                      display_order: 0
                    - session_type: "RECITATION"
                      text_id: "f9e8d7c6-b5a4-3210-fedc-ba9876543210"
                      display_order: 1
      responses:
        '200':
          description: Routine updated successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoutineResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/ValidationError'

    delete:
      tags:
        - User Routines
      summary: Delete user's routine
      description: |
        Deletes the authenticated user's routine including all time blocks
        and sessions. Does not affect plan enrollments or user recitations.
      operationId: deleteUserRoutine
      responses:
        '204':
          description: Routine deleted successfully.
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

# ──────────────────────────────────────────────
# Database Tables (via Alembic migration)
# ──────────────────────────────────────────────
#
# Table: routines
# ─────────────────────────────────────────────
# id          UUID  PK  default uuid4()
# user_id     UUID  FK → users.id  ON DELETE CASCADE  UNIQUE
# created_at  DateTime(tz)  default now()
# updated_at  DateTime(tz)  default now()
#
# Table: routine_time_blocks
# ─────────────────────────────────────────────
# id                    UUID  PK  default uuid4()
# routine_id            UUID  FK → routines.id  ON DELETE CASCADE
# time                  String(5)  NOT NULL  (HH:MM 24-hour)
# notification_enabled  Boolean  default true
# display_order         Integer  NOT NULL
# created_at            DateTime(tz)  default now()
# updated_at            DateTime(tz)  default now()
#
# Index: idx_time_blocks_routine on routine_id
# Unique: (routine_id, time) — no duplicate times within a routine
#
# Table: routine_sessions
# ─────────────────────────────────────────────
# id              UUID  PK  default uuid4()
# time_block_id   UUID  FK → routine_time_blocks.id  ON DELETE CASCADE
# session_type    Enum('PLAN','RECITATION')  NOT NULL
# plan_id         UUID  nullable  FK → plans.id  ON DELETE RESTRICT
# text_id         UUID  nullable  (references MongoDB, no FK)
# display_order   Integer  NOT NULL
# created_at      DateTime(tz)  default now()
# updated_at      DateTime(tz)  default now()
#
# Index: idx_sessions_time_block on time_block_id
# Unique: idx_unique_plan_per_routine on plan_id WHERE plan_id IS NOT NULL
# Check: (session_type='PLAN' AND plan_id IS NOT NULL AND text_id IS NULL)
#     OR (session_type='RECITATION' AND text_id IS NOT NULL AND plan_id IS NULL)
# text_id: no unique constraint (recitations can repeat)
#
# Relationships:
#   User (1) ──── (1) Routine
#   Routine (1) ──── (many) TimeBlock
#   TimeBlock (1) ──── (many) RoutineSession
#
# Cascade: Delete User → Routine → TimeBlocks → Sessions